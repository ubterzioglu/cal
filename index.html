<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAL Community | Cağaloğlu Anadolu Lisesi Topluluğu</title>
    <meta name="description" content="Cağaloğlu Anadolu Lisesi öğrenci ve mezunlarını bir araya getiren dijital topluluk platformu." />
    <meta name="author" content="CAL Community" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Primary og:* / twitter:* tags (title, description, type, url, image, card)
      are managed per-page by react-helmet-async (src/seo/Seo.tsx) and embedded
      at prerender time. Only the supplementary, page-invariant tags live here so
      they are not duplicated.
    -->
    <meta property="og:site_name" content="CAL Community" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:image:secure_url" content="https://calcom.club/ogcal.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CAL Community | Cağaloğlu Anadolu Lisesi Topluluğu" />
    <meta name="twitter:image:alt" content="CAL Community | Cağaloğlu Anadolu Lisesi Topluluğu" />
    <!--
      Analytics (Microsoft Clarity, GoatCounter) are intentionally NOT loaded here.
      They are injected only after the user grants analytics consent via the cookie
      banner — see src/legal/loaders.ts and src/components/legal/CookieBanner.tsx.
      Do not add an inline analytics snippet here: it would bypass consent (KVKK/GDPR).
    -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
